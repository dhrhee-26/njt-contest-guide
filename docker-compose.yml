# NJT contest — intern-facing one-line bring-up. (Phase 2 — no PR, no merge.)
#
# Intern setup (one time):
#   - generate an SSH key + add it to GitHub  (see setup.md Part 3)
#   git clone https://github.com/dhrhee-26/njt-contest-guide.git ~/njt-contest
#   cd ~/njt-contest
#   git clone git@github.com:dhrhee-26/njt-submissions.git workspace
#   cd workspace && git checkout interns/<your-handle> && cd ..
#
# `workspace/` (your interns/<handle> branch) IS your workspace from here on
# — code and results together, no separate my-alphas/submissions split.
#
# Daily:
#   docker compose up -d                  # http://localhost:8888 + :8050
#   docker compose down                   # stop
#
# Submission from inside Jupyter:
#   from framework import submit
#   submit(Alpha(), strategy_id="my_alpha_v1", preset="binance_um_perpetual")
#
# submit() runs export_submission (positions.parquet + meta.json under
# interns/<handle>/<strategy_id>/), then `git add -A` (your whole workspace,
# code included) + commit + push to the branch you're currently on. No PR —
# pushing to your own branch is the submission. To see peers, run
# workspace/tools/sync_peers.sh. The container's entrypoint converts the
# workspace's origin URL to SSH at startup if you cloned via HTTPS, using the
# SSH key mounted from the host below.

services:
  njt:
    # NOTE: pinned to :main until the first v* release tag lands a :latest.
    image: ghcr.io/dhrhee-26/njt-dash:main
    container_name: njt
    ports:
      - "8888:8888"        # Jupyter Lab
      - "8050:8050"        # dash UI
    volumes:
      # Your interns/<handle> branch, checked out on the host — the single
      # source of truth for code AND results. Jupyter Lab root, submit()'s
      # commit/push target, and dash's --submissions root are all this one
      # directory.
      - ./workspace:/workspace

      # Persist Binance Vision download cache across container restarts.
      # Without this, every `docker compose down/up` cycle wipes ~/.cache/feeds
      # and the next backtest re-downloads zip files for each symbol (~3 min
      # for 9 assets). Host directory is auto-created on first `up`.
      - ./data-cache:/home/njt/.cache

      # Host git config + SSH key, read-only, so `git push` from inside the
      # container can authenticate as you. No second auth setup needed.
      #
      # Mount target paths match the image's $HOME (=/home/njt, set in the
      # Dockerfile). Mounting to /root/* would make the files visible inside
      # the container but git/ssh would still look at $HOME/.gitconfig and
      # $HOME/.ssh and find nothing.
      #
      # The entrypoint requires at least one ~/.ssh/id_* private key (fails
      # loud at startup if missing) and pre-populates known_hosts for
      # github.com via ssh-keyscan into a writable /tmp path.
      - ${HOME}/.gitconfig:/home/njt/.gitconfig:ro
      - ${HOME}/.ssh:/home/njt/.ssh:ro
    restart: unless-stopped
