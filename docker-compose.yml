# NJT contest — intern-facing one-line bring-up.
#
# Intern setup (one time):
#   - generate an SSH key + add it to GitHub  (see setup.md Part 3)
#   git clone https://github.com/dhrhee-26/njt-contest-guide.git ~/njt-contest
#   cd ~/njt-contest
#   git clone git@github.com:dhrhee-26/njt-submissions.git
#   echo "NJT_HANDLE=<your-handle>" > .env     # tells submit() which branch is yours
#
# You do NOT need to check out interns/<handle> — leave njt-submissions on
# `main` and just `git pull` to see merged + peer alphas. submit() pushes to
# your branch on its own (NJT-032).
#
# Daily:
#   docker compose up -d                  # http://localhost:8888 + :8050
#   docker compose down                   # stop
#
# Submission from inside Jupyter — one call, from any branch:
#   from framework import submit
#   submit(Alpha(), strategy_id="my_alpha_v1", preset="binance_um_perpetual")
#
# Under the hood, submit() runs export_submission (positions.parquet +
# meta.json under /submissions/interns/<handle>/<strategy_id>/), then commits
# + pushes that folder to origin/interns/<handle> through a throwaway git
# worktree (your checked-out branch never moves), and prints the PR URL. The
# container's entrypoint converts the /submissions origin URL to SSH at startup
# if the host cloned via HTTPS, and uses the SSH key mounted from the host below.

services:
  njt:
    # NOTE: pinned to :main until the first v* release tag lands a :latest.
    # `:latest` is only published on v* tag pushes (see njt-sdk-dist CI),
    # and the v0.1.0 push is currently delayed by a GitHub Actions outage.
    image: ghcr.io/dhrhee-26/njt-sdk-dist:main
    container_name: njt
    environment:
      # Your contest handle — submit() pushes to interns/$NJT_HANDLE without
      # needing that branch checked out. Set once in ~/njt-contest/.env:
      #   echo "NJT_HANDLE=<your-handle>" > .env
      # (If unset, submit() falls back to the checked-out interns/<handle>.)
      - NJT_HANDLE=${NJT_HANDLE:-}
    ports:
      - "8888:8888"        # Jupyter Lab
      - "8050:8050"        # dash UI
    volumes:
      # Intern's alpha workspace (Jupyter Lab root).
      - ./my-alphas:/workspace

      # Cloned njt-submissions repo (intern's branch checked out on the host).
      # submit() / export_submission(submissions_root="/submissions") write
      # here, and the dash UI reads from here.
      - ./njt-submissions:/submissions

      # Persist Binance Vision download cache across container restarts.
      # Without this, every `docker compose down/up` cycle wipes ~/.cache/feeds
      # and the next backtest re-downloads zip files for each symbol (~3 min
      # for 9 assets). Host directory is auto-created on first `up`.
      - ./data-cache:/home/njt/.cache

      # Host git config + SSH key, read-only, so `git push` from inside the
      # container can authenticate as the intern. No second auth setup needed.
      #
      # Mount target paths match the image's $HOME (=/home/njt, set in the
      # Dockerfile). Mounting to /root/* would make the files visible inside
      # the container but git/ssh would still look at $HOME/.gitconfig and
      # $HOME/.ssh and find nothing.
      #
      # The entrypoint requires at least one ~/.ssh/id_* private key (fails
      # loud at startup if missing) and pre-populates known_hosts for
      # github.com via ssh-keyscan into a writable /tmp path.
      - ${HOME}/.gitconfig:/home/njt/.gitconfig:ro
      - ${HOME}/.ssh:/home/njt/.ssh:ro
    restart: unless-stopped
